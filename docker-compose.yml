services:
  db:
    image: mysql:8
    container_name: envios_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - envios_network

  redis:
    image: redis:7-alpine
    container_name: envios_redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n '$$REDIS_PASSWORD' ];
      then redis-server --requirepass $$REDIS_PASSWORD;
      else redis-server; fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - envios_network

volumes:
  db_data:
  redis_data:

networks:
  envios_network:
    driver: bridge
